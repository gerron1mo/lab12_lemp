services:

  nginx:
    image: nginx:1.25.4
    container_name: lemp_nginx
    ports:
      - "4001:80"
    volumes:
      - ./app:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - frontend
      - backend

  php:
    image: php:8.3-fpm
    container_name: lemp_php
    volumes:
      - ./app:/var/www/html
    networks:
      - backend

  mysql:
    image: mysql:8.3.0
    container_name: lemp_mysql
    environment:
      MYSQL_ROOT_PASSWORD: student_pass
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2.1
    container_name: lemp_pma
    ports:
      - "6001:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql
    networks:
      - frontend
      - backend

volumes:
  mysql_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge